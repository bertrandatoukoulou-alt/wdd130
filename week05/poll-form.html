<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>

    </header>

    <main>
        <form>
            <label for="fullname">Full name:</label>
            <input type="text" id="fullname" name="fullname" required>
            <label for="useremail">Email:</label>
            <input type="text" id="useremail" type="useremail" required>
            <label for="quantity">Select Quantity:</label>
            <select>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select>
            <label for="browser">What is your favourite browser?</label>
            <select id="browser" name="Browser">
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>
            <label for="pet">Do you have a pet?</label>
            <input type="checkbox" id="pet" name="pet">
            <label for="feedback">List the Place you have lived</label>
            <textarea id="feedback" name="feedback" rows="4"
              placeholder="Stillwater florida, Amsterdam netherlands, Timbuktu Mali"></textarea>
            <button type="submit">Submit poll</button>
        </form>

    </main>

    <footer>

    </footer>

</body>

</html>
